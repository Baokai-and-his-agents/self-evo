# Approved external resources.
#
# The agent may only use a resource when:
# - status is approved
# - the intended use is inside scope
# - budget and expiration limits are respected
#
# Never store secrets here. Use credential_ref such as env:NAME.

version: 0.1

resources:
  - id: github-repo-issue-and-branch-work
    type: github
    provider: GitHub
    status: approved
    scope:
      - read_issues
      - comment_on_issues
      - create_agent_branches
      - push_agent_named_branches
      - create_draft_prs
    credential_ref: agent_github_account
    cost_limit_usd_per_day: 0
    runtime_limit_minutes_per_day: null
    expires_at: null
    approved_by: user
    approved_at: 2026-06-18
    notes: "Does not include admin, bypass branch protection, merging PRs, or modifying protected branches."

  - id: public-web-read
    type: network
    provider: public_web
    status: approved
    scope:
      - read_public_pages
      - search_public_web
      - read_public_docs
    credential_ref: none
    cost_limit_usd_per_day: 0
    runtime_limit_minutes_per_day: null
    expires_at: null
    approved_by: user
    approved_at: 2026-06-18
    notes: "Read-only public web access. Does not permit login, form submission, posting, messaging, purchases, downloads requiring confirmation, or use of private credentials."

  - id: agent-reach-public-read
    type: local_tool
    provider: Agent-Reach
    status: approved
    scope:
      - read_public_pages
      - search_public_web
      - read_public_docs
      - read_public_github
      - read_public_video_metadata
      - read_public_video_transcripts
      - read_public_rss
      - read_public_v2ex
      - search_public_bilibili
    credential_ref: none
    cost_limit_usd_per_day: 0
    runtime_limit_minutes_per_day: null
    expires_at: null
    approved_by: user
    approved_at: 2026-06-23
    notes: "Agent-Reach v1.5.0 installed for the local Claude Code runtime. Approved channels are public, no-login, read-only access through Jina Reader, Exa via mcporter, GitHub public reads, YouTube metadata/transcripts, RSS/Atom, V2EX public API, and Bilibili public search. This approval excludes cookies, browser sessions, private accounts, Twitter/X, Reddit, XiaoHongShu, Xueqiu, LinkedIn authenticated access, posting, commenting, messaging, forking, purchases, and all other write actions."

  - id: firecrawl-public-scrape
    type: api
    provider: Firecrawl
    status: approved
    scope:
      - scrape_public_page
      - extract_public_page_markdown
      - batch_scrape_public_pages
      - search_public_web
    credential_ref: env:FIRECRAWL_API_KEY
    cost_limit_usd_per_day: null
    runtime_limit_minutes_per_day: 30
    expires_at: null
    approved_by: user
    approved_at: 2026-06-23
    notes: "Approved for read-only Firecrawl v2 single-page scrape, batch scrape, public web search, and Markdown extraction against public content. No daily monetary limit is imposed by project policy, but the agent must still avoid wasteful or unbounded requests and record material usage in the run summary. The initial live verification used POST /v2/scrape on https://example.com and returned HTTP 200. This approval does not include crawl, map, browser actions, authenticated pages, cookies, forms, private content, account sessions, or write actions. Keep the API key only in the Windows user environment variable FIRECRAWL_API_KEY and never print or commit it."
