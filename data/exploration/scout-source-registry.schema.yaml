# Scout 来源注册 Schema
# 定义批准的公开只读探索来源

type: object
required:
  - id
  - type
  - base_url
  - access_mode
  - enabled
properties:
  id:
    type: string
    description: |
      来源唯一标识符（kebab-case）
      示例：github-trending, hacker-news, arxiv-cs-ai
    pattern: "^[a-z0-9-]+$"

  type:
    type: string
    description: |
      来源类型
      - web: 公开网站（HTML 抓取）
      - api: 公开 API（JSON/XML）
      - rss: RSS/Atom feed
      - git: Git repository（公开只读）
    enum:
      - web
      - api
      - rss
      - git

  base_url:
    type: string
    description: |
      来源根 URL（必须包含 scheme）
      示例：
        - https://github.com/trending
        - https://news.ycombinator.com
        - https://export.arxiv.org/api/query

  access_mode:
    type: string
    description: |
      访问模式 — 定义能力边界（能力 scope）

      rules/RESOURCE_APPROVALS.yaml 定义批准的能力 scope（可以做什么操作）
      本 registry 定义具体来源 allowlist（可以访问哪些域名/URL）

      public-web-read: 公开只读，无需身份验证
        - HTTP GET 请求
        - 遵守 robots.txt
        - 尊重 rate limit headers
        - User-Agent 标识为 research bot
        - 不越过登录墙

      如需以下任何访问方式，必须新建资源审批 proposal：
        - 登录/身份验证（OAuth、API token）
        - 付费 API（需要 billing）
        - 写操作（POST、PUT、DELETE）
        - 私有/内部资源
        - 用户身份模拟
        - 超出 public-web-read 的任何访问
    enum:
      - public-web-read

  resource_approval_id:
    type: string
    description: |
      对应的资源审批 ID（引用 rules/RESOURCE_APPROVALS.yaml）

      必须使用仓库中实际存在的稳定资源 ID，例如：
        - public-web-read
        - github-repo-issue-and-branch-work

      Scout runner 只读检查该字段，验证：
        1. 该 ID 在 rules/RESOURCE_APPROVALS.yaml 中存在
        2. 其 status 为 approved
        3. 其 scope 覆盖本条目的访问方式
    pattern: "^[a-z0-9-]+$"

  enabled:
    type: boolean
    description: |
      来源是否启用
      false = 已批准但暂停使用（如触发 rate limit、来源下线）

  cursor_strategy:
    type: string
    description: |
      Cursor 跟踪策略（用于恢复和去重）

      timestamp: 时间戳游标（ISO 8601）
        适用：RSS feeds、时间排序 API
        示例：2026-06-22T10:00:00Z

      item_id: 项目 ID 游标（来源特定格式）
        适用：分页 API、数据库式来源
        示例：github_repo_12345, hn_item_67890

      etag: ETag 或 Last-Modified 头
        适用：支持条件请求的 HTTP 资源
        示例："abc123def456"

      offset: 偏移量游标（整数）
        适用：简单分页 API
        示例：100（表示已处理前 100 项）
    enum:
      - timestamp
      - item_id
      - etag
      - offset
    default: timestamp

# 示例 1：GitHub Trending（公开 web 抓取）
example_github_trending:
  id: github-trending
  type: web
  base_url: https://github.com/trending
  access_mode: public-web-read
  resource_approval_id: public-web-read
  enabled: true
  cursor_strategy: timestamp

# 示例 2：Hacker News（公开 API）
example_hacker_news:
  id: hacker-news
  type: api
  base_url: https://hacker-news.firebaseio.com/v0
  access_mode: public-web-read
  resource_approval_id: public-web-read
  enabled: true
  cursor_strategy: item_id

# 示例 3：arXiv（公开 API）
example_arxiv:
  id: arxiv-cs-ai
  type: api
  base_url: https://export.arxiv.org/api/query
  access_mode: public-web-read
  resource_approval_id: public-web-read
  enabled: true
  cursor_strategy: timestamp

# 示例 4：Product Hunt（公开 web 抓取，无需登录）
example_producthunt_web:
  id: producthunt-daily
  type: web
  base_url: https://www.producthunt.com
  access_mode: public-web-read
  resource_approval_id: public-web-read
  enabled: true
  cursor_strategy: timestamp

# 示例 5：Product Hunt API（需要 API token）
# 当前未批准 — 注释示例说明需要的 proposal 流程
#
# 如需使用 Product Hunt API（需要 token），必须提交新资源审批 proposal 说明：
#   1. 为何需要 API 而非 web 抓取
#   2. Token 获取和存储方案（gitignored config）
#   3. 访问权限范围（只读公开数据）
#   4. Rate limit 策略
#   5. 批准后在 rules/RESOURCE_APPROVALS.yaml 添加新条目（如 producthunt-api-readonly）
#   6. 可能需要在本 schema 添加新 access_mode 值（如 api-with-token）
#
# 在批准前，该来源不应出现在有效 registry 实例中，或应标记为：
# example_producthunt_api_pending:
#   id: producthunt-api
#   type: api
#   base_url: https://api.producthunt.com/v2
#   access_mode: public-web-read  # 占位 — 实际需要新 access_mode
#   resource_approval_id: pending-approval
#   enabled: false  # 明确标记为不可运行
#   cursor_strategy: item_id
#   notes: "Requires API token approval proposal before use"

# 关于登录/token/付费访问：
# 任何需要以下的访问方式，都需要新的资源审批 proposal：
#   - 用户登录（OAuth、session cookie）
#   - API token/key（即使是免费 tier）
#   - 付费 API（需要 billing）
#   - 写操作（POST、PUT、DELETE）
#   - 私有资源（需要权限的 repo、文档）
#   - 用户身份模拟（代表用户执行操作）
#
# Proposal 应包括：
#   1. 访问方式和权限范围
#   2. 凭证获取和存储方案（gitignored）
#   3. 安全边界和审计需求
#   4. 成本估算（如付费 API）
#   5. 退出/撤销方案
#
# 批准后在 rules/RESOURCE_APPROVALS.yaml 添加对应条目
# Scout runner 只读检查 rules/ 中的批准状态
